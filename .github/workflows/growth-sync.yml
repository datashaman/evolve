name: Growth sync

on:
  pull_request:
    types: [opened, synchronize, closed]
  check_run:
    types: [completed]
  workflow_run:
    workflows: ["tests.yml", "lint.yml"]
    types: [completed]
  deployment_status:
  release:
    types: [published]

permissions:
  contents: read
  checks: write
  actions: read
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: datashaman/growth/actions/growth-sync@main
        with:
          growth-url: ${{ vars.GROWTH_URL }}
          growth-token: ${{ secrets.GROWTH_MCP_TOKEN }}
