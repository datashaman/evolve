<!-- name: Marketing layout -->
<!-- tag: x-marketing-layout -->
<style id="x-marketing-layout-css" media="not all">
    :host { display: block; }
    .shell {
      min-height: 100vh;
      background:
        linear-gradient(180deg, color-mix(in srgb, var(--accent, #2563eb) 8%, transparent), transparent 360px),
        var(--surface-soft, #f6f8fb);
      color: var(--text, #172026);
      font-family: var(--font-sans, system-ui, sans-serif);
    }
    .wrap {
      width: min(1120px, calc(100vw - 40px));
      margin: 0 auto;
    }
    main {
      display: grid;
      gap: clamp(44px, 7vw, 88px);
      padding-bottom: 64px;
    }
    footer {
      padding: 28px 0 42px;
      color: var(--text-muted, #5f6f7a);
      font-size: 14px;
      border-top: 1px solid var(--border, #d9e2ea);
    }
</style>

<template id="x-marketing-layout-tpl">
  <div class="shell">
    <div class="wrap">
      <x-component src="site-header">
        <span slot="brand">Northstar Studio</span>
        <a slot="nav" href="#services">Services</a>
        <a slot="nav" href="#proof">Proof</a>
        <a slot="nav" href="#contact">Contact</a>
        <span slot="action">Plan the site</span>
      </x-component>
      <main>
        <x-part name="hero" />
        <x-part name="main" />
        <x-part name="cta" />
      </main>
      <footer>
        <x-part name="footer">Built with the component workbench.</x-part>
      </footer>
    </div>
  </div>
</template>

<script type="text/html" data-usage>
<x-layout src="marketing-layout">
  <x-component src="hero-section">
    <span slot="eyebrow">Layout preview</span>
    <span slot="title">A marketing shell with a built-in header.</span>
    <span slot="body">This layout owns the navigation and renders supplied page sections into its main content slot.</span>

  <x-component src="cta-panel">

    <span slot="action">Preview action</span>
