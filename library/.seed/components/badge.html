<!-- name: Badge -->
<template id="x-badge-tpl">
  <style>
    :host { display: inline-block; }
    .badge { display: inline-block; font: 600 12px system-ui, sans-serif;
      padding: 4px 10px; border-radius: 999px;
      background: color-mix(in srgb, var(--accent, #6366f1) 15%, white);
      color: var(--accent, #6366f1); }
  </style>
  <span class="badge"><slot>Badge</slot></span>
</template>

<script>
  customElements.define('x-badge', class extends HTMLElement {
    connectedCallback() {
      if (this.shadowRoot) return;
      const tpl = document.getElementById('x-badge-tpl');
      this.attachShadow({ mode: 'open' }).append(tpl.content.cloneNode(true));
    }
  });
</script>

<script type="text/html" data-usage>
<x-badge>New</x-badge>
</script>
