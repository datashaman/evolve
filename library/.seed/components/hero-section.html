<!-- name: Hero section -->
<template id="x-hero-section-tpl">
  <style>
    :host { display: block; }
    section {
      display: grid;
      grid-template-columns: minmax(0, 1.1fr) minmax(280px, .9fr);
      gap: clamp(28px, 6vw, 72px);
      align-items: center;
      padding: clamp(48px, 8vw, 96px) 0;
    }
    .eyebrow {
      margin: 0 0 14px;
      color: var(--accent, #2563eb);
      font: 700 13px var(--font-sans, system-ui, sans-serif);
      text-transform: uppercase;
      letter-spacing: .08em;
    }
    h1 {
      margin: 0;
      max-width: 760px;
      color: var(--text, #172026);
      font: 760 clamp(44px, 7vw, 76px)/.95 var(--font-sans, system-ui, sans-serif);
    }
    p {
      margin: 22px 0 0;
      max-width: 620px;
      color: var(--text-muted, #5f6f7a);
      font: 18px/1.7 var(--font-sans, system-ui, sans-serif);
    }
    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 30px;
    }
    .primary, .secondary {
      display: inline-flex;
      align-items: center;
      min-height: 46px;
      padding: 0 18px;
      border-radius: var(--radius-sm, 8px);
      font: 700 15px var(--font-sans, system-ui, sans-serif);
      text-decoration: none;
    }
    .primary { background: var(--accent, #2563eb); color: white; }
    .secondary { background: var(--surface-strong, #edf2f7); color: var(--text, #172026); }
    .panel {
      border: 1px solid var(--border, #d9e2ea);
      border-radius: var(--radius, 16px);
      background: var(--surface, #fff);
      box-shadow: var(--shadow, 0 18px 50px rgba(23,32,38,.12));
      padding: 22px;
    }
    @media (max-width: 860px) {
      section { grid-template-columns: 1fr; }
    }
  </style>
  <section>
    <div>
      <p class="eyebrow"><slot name="eyebrow">Strategy and delivery</slot></p>
      <h1><slot name="title">Launch a sharper service business online.</slot></h1>
      <p><slot name="body">A focused site system for consultants, studios, and operators who need a credible web presence without a sprawling build.</slot></p>
      <div class="actions">
        <a class="primary" href="#contact"><slot name="primary">Start a project</slot></a>
        <a class="secondary" href="#services"><slot name="secondary">Explore services</slot></a>
      </div>
    </div>
    <div class="panel">
      <slot name="aside"></slot>
    </div>
  </section>
</template>

<script>
  customElements.define('x-hero-section', class extends HTMLElement {
    connectedCallback() {
      if (this.shadowRoot) return;
      const tpl = document.getElementById('x-hero-section-tpl');
      this.attachShadow({ mode: 'open' }).append(tpl.content.cloneNode(true));
    }
  });
</script>

<script type="text/html" data-usage>
<x-hero-section>
  <span slot="eyebrow">Studio starter</span>
  <span slot="title">A practical website scaffold for a service business.</span>
  <span slot="body">Use this seed as a realistic starting point: navigation, hero, service cards, CTA, layout, and page composition.</span>
</x-hero-section>
</script>
