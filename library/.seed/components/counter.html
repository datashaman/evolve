<!-- name: Counter -->
<template id="x-counter-tpl">
  <style>
    .counter { display: inline-flex; align-items: center; gap: 14px;
      font: 600 18px system-ui, sans-serif; }
    button { font: inherit; width: 38px; height: 38px; cursor: pointer;
      border: 0; border-radius: var(--radius-sm, 8px);
      background: var(--accent, #6366f1); color: #fff; }
    button:hover { filter: brightness(1.08); }
    output { min-width: 2ch; text-align: center; color: var(--text, #111); }
  </style>
  <div class="counter">
    <button id="dec" aria-label="decrement">−</button>
    <output id="val"></output>
    <button id="inc" aria-label="increment">+</button>
  </div>
</template>

<script>
  customElements.define('x-counter', class extends HTMLElement {
    connectedCallback() {
      if (this.shadowRoot) return;
      const root = this.attachShadow({ mode: 'open' });
      root.append(document.getElementById('x-counter-tpl').content.cloneNode(true));
      this.out = root.getElementById('val');
      root.getElementById('inc').onclick = () => this.render(this.count + 1);
      root.getElementById('dec').onclick = () => this.render(this.count - 1);
      this.render(Number(this.getAttribute('start') || 0));
    }
    render(n) { this.count = n; this.out.textContent = n; }
  });
</script>

<script type="text/html" data-usage>
<x-counter start="3"></x-counter>
</script>
