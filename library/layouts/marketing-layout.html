<!-- name: Marketing layout -->
<!-- requires: components/site-header.html, components/hero-section.html, components/cta-panel.html -->
<style id="x-marketing-layout-css" media="not all">
    :host { display: block; }
    .shell {
      min-height: 100vh;
      background:
        linear-gradient(180deg, color-mix(in srgb, var(--accent, #2563eb) 8%, transparent), transparent 360px),
        var(--surface-soft, #f6f8fb);
      color: var(--text, #172026);
      font-family: var(--font-sans, system-ui, sans-serif);
    }
    .wrap {
      width: min(1120px, calc(100vw - 40px));
      margin: 0 auto;
    }
    main {
      display: grid;
      gap: clamp(44px, 7vw, 88px);
      padding-bottom: 64px;
    }
    footer {
      padding: 28px 0 42px;
      color: var(--text-muted, #5f6f7a);
      font-size: 14px;
      border-top: 1px solid var(--border, #d9e2ea);
    }
</style>

<template id="x-marketing-layout-tpl">
  <div class="shell">
    <div class="wrap">
      <slot name="header"></slot>
      <main>
        <slot></slot>
      </main>
      <footer>
        <slot name="footer">Built with the component workbench.</slot>
      </footer>
    </div>
  </div>
</template>

<script>
  defineArtifact('x-marketing-layout', 'x-marketing-layout-tpl', 'x-marketing-layout-css');
</script>

<script type="text/html" data-usage>
<x-marketing-layout>
  <x-site-header slot="header"></x-site-header>
  <x-hero-section></x-hero-section>
  <x-cta-panel></x-cta-panel>
</x-marketing-layout>
</script>
