<!-- name: Site header -->
<template id="x-site-header-tpl">
  <style>
    :host { display: block; }
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--space-lg, 24px);
      padding: 18px 0;
      color: var(--text, #172026);
      font: 500 15px var(--font-sans, system-ui, sans-serif);
    }
    .brand {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-weight: 750;
      letter-spacing: 0;
    }
    .mark {
      width: 34px;
      height: 34px;
      border-radius: var(--radius-sm, 8px);
      background: var(--accent, #2563eb);
      box-shadow: inset 0 -10px 18px rgba(0,0,0,.14);
    }
    nav {
      display: flex;
      align-items: center;
      gap: 22px;
      color: var(--text-muted, #5f6f7a);
    }
    a { color: inherit; text-decoration: none; }
    a:hover { color: var(--text, #172026); }
    .action {
      padding: 10px 14px;
      border-radius: var(--radius-sm, 8px);
      background: var(--text, #172026);
      color: white;
    }
    @media (max-width: 680px) {
      header { align-items: flex-start; flex-direction: column; }
      nav { flex-wrap: wrap; gap: 14px; }
    }
  </style>
  <header>
    <a class="brand" href="#">
      <span class="mark" aria-hidden="true"></span>
      <slot name="brand">Northstar</slot>
    </a>
    <nav aria-label="Primary">
      <slot name="nav"></slot>
      <a class="action" href="#contact"><slot name="action">Book a demo</slot></a>
    </nav>
  </header>
</template>

<script>
  customElements.define('x-site-header', class extends HTMLElement {
    connectedCallback() {
      if (this.shadowRoot) return;
      const tpl = document.getElementById('x-site-header-tpl');
      this.attachShadow({ mode: 'open' }).append(tpl.content.cloneNode(true));
    }
  });
</script>

<script type="text/html" data-usage>
<x-site-header>
  <span slot="brand">Northstar</span>
  <a slot="nav" href="#services">Services</a>
  <a slot="nav" href="#work">Work</a>
  <a slot="nav" href="#contact">Contact</a>
</x-site-header>
</script>
